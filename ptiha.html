<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA-STUDIO | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --transition-main: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: fixed;
        }

        /* --- רכיב לוגו אלקטרוני עם אור כלוא --- */
        .logo-header {
            position: absolute;
            top: 40px;
            z-index: 100;
        }

        .electronic-frame {
            position: relative;
            padding: 12px 25px;
            background: rgba(10, 10, 10, 0.8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden; /* כליאת האור */
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
        }

        /* האור הכלוא */
        .electronic-frame::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: conic-gradient(transparent, transparent, var(--neon-blue), var(--neon-purple), transparent);
            animation: trappedLight 2s linear infinite;
            z-index: 1;
        }

        /* שכבת כיסוי פנימית ליצירת אפקט מסגרת */
        .electronic-frame::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: var(--bg-dark);
            border-radius: 10px;
            z-index: 2;
        }

        .logo-content {
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chip-icon {
            color: var(--neon-blue);
            filter: drop-shadow(0 0 5px var(--neon-blue));
        }

        .logo-text-brand {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: none;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes trappedLight {
            0% { transform: rotate(0deg) scale(2); }
            100% { transform: rotate(360deg) scale(2); }
        }

        /* --- סוף רכיב לוגו --- */

        .aura-bg {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.04) 0%, rgba(188, 19, 254, 0.04) 30%, transparent 70%);
            z-index: -1;
            animation: moveAura 20s infinite alternate ease-in-out;
        }

        @keyframes moveAura {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(10%, 10%); }
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
            z-index: 10;
        }

        .welcome-text {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 100;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.2s forwards cubic-bezier(0.19, 1, 0.22, 1);
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .sub-text {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            opacity: 0;
            animation: fadeInUp 1.2s 0.3s forwards cubic-bezier(0.19, 1, 0.22, 1);
            margin-bottom: 50px;
        }

        .icon-inline {
            vertical-align: middle;
            margin: 0 5px;
            opacity: 0.8;
        }

        .btn-wrapper {
            position: relative;
            display: inline-block;
            opacity: 0;
            animation: fadeInUp 1.2s 0.6s forwards;
        }

        .connect-status {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--neon-blue);
            white-space: nowrap;
            opacity: 0;
            transition: var(--transition-main);
        }

        .ramo-btn {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 20px 50px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition-main);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .ramo-btn::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50px;
            padding: 2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.3;
            animation: glowPulse 3s infinite;
        }

        @keyframes glowPulse {
            0% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); }
            100% { opacity: 0.2; transform: scale(1); }
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.2), transparent);
            transition: none;
        }

        .ramo-btn.active .scan-line {
            left: 100%;
            transition: 2s linear;
        }

        .footer-security {
            position: absolute;
            bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeInUp 1s 1s forwards;
        }

        .dot-live {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: blink 1.5s infinite;
        }

        .mini-loader {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0, 242, 255, 0.2);
            border-top: 2px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0.3; } }

    </style>
</head>
<body>

    <header class="logo-header">
        <div class="electronic-frame">
            <div class="logo-content">
                <svg class="chip-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="15" x2="23" y2="15"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="15" x2="4" y2="15"></line></svg>
                <span class="logo-text-brand">AURA-studio</span>
            </div>
        </div>
    </header>

    <div class="aura-bg"></div>

    <div class="container">
        <h1 class="welcome-text">WELCOME TO AURA-STUDIO</h1>
        
        <div class="sub-text">
            <p>
                <svg class="icon-inline" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 12L2.69 6.5"></path><path d="M12 12L21.31 6.5"></path></svg>
                חווית הבינה המלאכותית הכי מזוקקת, בעלת ליבה עם תהליך למידה חי.
            </p>
            <p style="margin-top: 10px;">
                <svg class="icon-inline" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                הסוכן שלנו-<strong>Ramo</strong> מחכה לפקודות שלך. שפר את העסק שלך עם סוכן עוצמתי בחינם!
            </p>
        </div>

        <div class="btn-wrapper">
            <div id="status" class="connect-status">
                <span>Ramo connects</span>
                <div class="mini-loader"></div>
            </div>
            
            <button id="talkBtn" class="ramo-btn" onclick="initiateRamo()">
                <div class="scan-line"></div>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                <span id="btnText">Talk Ramo</span>
            </button>
        </div>
    </div>

    <div class="footer-security">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span>SECURITY ENCRYPTED</span>
        <span style="color: rgba(255,255,255,0.1);">|</span>
        <div class="dot-live"></div>
        <span style="color: #00ff88; font-weight: 600;">VERIFIED</span>
    </div>

    <script>
        function initiateRamo() {
            const btn = document.getElementById('talkBtn');
            const btnText = document.getElementById('btnText');
            const status = document.getElementById('status');
            
            btn.style.pointerEvents = 'none';

            status.style.opacity = '1';
            btn.classList.add('active');
            btnText.innerText = 'VERIFYING...';
            btn.style.boxShadow = '0 0 40px rgba(0, 242, 255, 0.2)';

            setTimeout(() => {
                document.body.style.transition = 'opacity 1s ease, filter 1s ease';
                document.body.style.opacity = '0';
                document.body.style.filter = 'blur(10px)';
                
                setTimeout(() => {
                    window.location.href = 'chat.html';
                }, 800);
            }, 3000);
        }

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
