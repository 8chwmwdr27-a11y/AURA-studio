<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA STUDIO | Neural Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020202;
            --apple-ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* נעילת תצוגה מוחלטת */
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: none; }

        html, body {
            height: 100%; width: 100vw; margin: 0; padding: 0;
            background: var(--bg-dark); color: white;
            overflow: hidden; position: fixed;
        }

        #canvas-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.3; }

        /* לוגו המותג */
        .aura-header {
            width: 100%; padding: 30px 0;
            display: flex; justify-content: center;
            position: absolute; top: 0; z-index: 100;
        }
        .electronic-frame {
            position: relative; padding: 10px 20px; background: rgba(10, 10, 10, 0.9);
            border-radius: 12px; display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }
        .electronic-frame::before {
            content: ''; position: absolute; width: 150px; height: 150px;
            background: conic-gradient(transparent, var(--neon-blue), transparent, var(--neon-purple), transparent);
            animation: trapRotate 2s linear infinite; z-index: 1;
        }
        .electronic-frame::after { content: ''; position: absolute; inset: 2px; background: var(--bg-dark); border-radius: 10px; z-index: 2; }
        .logo-content { position: relative; z-index: 3; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; font-weight: 600; letter-spacing: 2px; }

        @keyframes trapRotate { 100% { transform: rotate(360deg) scale(2); } }

        .viewport-wrapper {
            height: 100%; width: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }

        .agents-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 40px; width: 100%;
        }

        .electric-card {
            position: relative; width: 100%; max-width: 320px; padding: 2px;
            border-radius: 20px; overflow: hidden;
        }
        .electric-card::before {
            content: ''; position: absolute; inset: -50%;
            background: conic-gradient(from 0deg, transparent, var(--neon-blue), transparent, var(--neon-purple), transparent);
            animation: borderFlow 4s linear infinite;
        }
        .card-inner {
            position: relative; z-index: 2; background: #050505;
            padding: 20px; border-radius: 18px; text-align: right;
        }
        @keyframes borderFlow { 100% { transform: rotate(360deg); } }

        .tag { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 0.55rem; font-weight: 900; margin-bottom: 10px; border: 1px solid var(--neon-blue); color: var(--neon-blue); }

        /* כפתור כניסה - אנימציה רכה */
        .entry-btn {
            width: 280px; height: 65px; background: transparent;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 50px;
            cursor: pointer; position: relative; overflow: hidden; transition: 0.6s var(--apple-ease);
        }
        .btn-text { color: white; font-weight: 400; font-size: 0.9rem; position: relative; z-index: 5; letter-spacing: 1px; }
        
        /* פעימת ליבה רכה בתוך הכפתור */
        .neural-pulse {
            position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
            transform: scale(0.5); opacity: 0; z-index: 1;
        }
        .entry-btn.loading .neural-pulse {
            animation: softPulse 2s var(--apple-ease) infinite;
        }
        @keyframes softPulse {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* מסך אימות עם אור רודף */
        .loader-overlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }
        
        /* אורות רודפים במסך המעבר */
        .chase-light {
            position: absolute; width: 150%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
            animation: chase 3s linear infinite;
            filter: blur(5px); opacity: 0.6;
        }
        .chase-light.v2 { animation-delay: 1.5s; top: 40%; }
        .chase-light.v3 { animation-delay: 0.7s; top: 60%; }

        @keyframes chase {
            0% { transform: translateX(-100%) rotate(-5deg); }
            100% { transform: translateX(100%) rotate(-5deg); }
        }

        .status-log { font-size: 0.7rem; color: var(--neon-blue); margin-top: 25px; font-family: monospace; z-index: 10; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon-blue); }
        
        .portal-flash { position: absolute; inset: 0; background: white; opacity: 0; z-index: 10001; pointer-events: none; }

        .footer-sig { position: absolute; bottom: 20px; display: flex; align-items: center; gap: 8px; font-size: 0.55rem; color: rgba(255,255,255,0.2); }
        .live-dot { width: 5px; height: 5px; background: #00ff88; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <header class="aura-header">
        <div class="electronic-frame">
            <div class="logo-content">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"></rect><rect x="9" y="9" width="6" height="6"></rect></svg>
                <span>AURA STUDIO</span>
            </div>
        </div>
    </header>

    <div class="viewport-wrapper">
        <div class="agents-container">
            <div class="electric-card">
                <div class="card-inner">
                    <div class="tag">RAMO CORE AI</div>
                    <p style="font-size:0.7rem; color:rgba(255,255,255,0.5); margin:0;">ליבת בינה מלאכותית מבוזרת המעבדת נתונים בשרתי קצה באסיה. RAMO מייצר אסטרטגיות שיווק מבוססות תודעה.</p>
                </div>
            </div>
            <div class="electric-card">
                <div class="card-inner">
                    <div class="tag" style="border-color:var(--neon-purple); color:var(--neon-purple);">AGAR SENTINEL</div>
                    <p style="font-size:0.7rem; color:rgba(255,255,255,0.5); margin:0;">מנהל המערכת האקטיבי. מאמת נתונים, מזהה פרצות אבטחה בזמן אמת ומאמן את הליבה דרך אימות חי.</p>
                </div>
            </div>
        </div>

        <button class="entry-btn" id="mainBtn" onclick="runSequence()">
            <div class="neural-pulse"></div>
            <span class="btn-text" id="btnTxt">כניסה ל-AURA STUDIO</span>
        </button>

        <footer class="footer-sig">
            <div class="live-dot"></div>
            <span>AURA SECURITY ENFORCED | CORE ACCESS</span>
        </footer>
    </div>

    <div class="loader-overlay" id="loader">
        <div class="chase-light"></div>
        <div class="chase-light v2"></div>
        <div class="chase-light v3"></div>
        
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#bc13fe" stroke-width="1" style="animation: trapRotate 2s linear infinite; filter: drop-shadow(0 0 10px var(--neon-purple));">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
        </svg>
        
        <div class="status-log" id="logTxt">SYNCHRONIZING...</div>
    </div>

    <div class="portal-flash" id="flash"></div>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; dots = []; for(let i=0; i<30; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5}); }
        function draw() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.strokeStyle = "rgba(0, 242, 255, 0.1)"; ctx.beginPath(); dots.forEach((d, i) => { d.x += d.vx; d.y += d.vy; if(d.x<0 || d.x>canvas.width) d.vx*=-1; if(d.y<0 || d.y>canvas.height) d.vy*=-1; dots.forEach((d2, j) => { if(i===j) return; let dist = Math.hypot(d.x-d2.x, d.y-d2.y); if(dist<150) { ctx.moveTo(d.x, d.y); ctx.lineTo(d2.x, d2.y); } }); }); ctx.stroke(); requestAnimationFrame(draw); }
        window.onload = () => { init(); draw(); };

        function runSequence() {
            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loader');
            const log = document.getElementById('logTxt');
            const flash = document.getElementById('flash');

            btn.classList.add('loading');
            
            setTimeout(() => {
                document.getElementById('btnTxt').innerText = "CORE CONNECTED";
                btn.style.borderColor = "var(--neon-blue)";
                btn.style.boxShadow = "0 0 30px rgba(0, 242, 255, 0.2)";
            }, 2500);

            setTimeout(() => {
                loader.style.display = 'flex';
                const stages = ["FETCHING RAMO...", "AGAR VALIDATION...", "NEURAL LINK ESTABLISHED"];
                let sIdx = 0;
                let logInterval = setInterval(() => {
                    log.innerText = stages[sIdx];
                    sIdx++;
                    if(sIdx >= stages.length) clearInterval(logInterval);
                }, 1300);

                setTimeout(() => {
                    flash.style.transition = "0.6s";
                    flash.style.opacity = "1";
                    setTimeout(() => { window.location.href = 'ptiha.html'; }, 600);
                }, 4000);
            }, 3500);
        }
    </script>
</body>
</html>
