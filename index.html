<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA-STUDIO | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --transition-main: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark); height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; overflow: hidden; position: fixed;
        }

        /* --- UI HEADER (Logo, Menu, Profile) --- */
        .ui-header {
            position: absolute; top: 40px; width: 100%; padding: 0 30px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }

        /* לוגו מרכזי */
        .electronic-frame {
            position: relative; padding: 12px 25px; background: rgba(10, 10, 10, 0.8);
            border-radius: 12px; display: flex; align-items: center; gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
        }
        .electronic-frame::before {
            content: ''; position: absolute; width: 150px; height: 150px;
            background: conic-gradient(transparent, transparent, var(--neon-blue), var(--neon-purple), transparent);
            animation: trappedLight 2s linear infinite; z-index: 1;
        }
        .electronic-frame::after { content: ''; position: absolute; inset: 2px; background: var(--bg-dark); border-radius: 10px; z-index: 2; }
        .logo-content { position: relative; z-index: 3; display: flex; align-items: center; gap: 10px; }
        .chip-icon { color: var(--neon-blue); filter: drop-shadow(0 0 5px var(--neon-blue)); }
        .logo-text-brand { font-size: 1rem; font-weight: 600; letter-spacing: 2px; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @keyframes trappedLight { 0% { transform: rotate(0deg) scale(2); } 100% { transform: rotate(360deg) scale(2); } }

        /* כפתור המבורגר (ימין) */
        .menu-trigger {
            width: 45px; height: 45px; background: var(--glass); border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
            cursor: pointer; border: 1px solid var(--border); transition: 0.3s;
        }
        .menu-trigger span { width: 22px; height: 2px; background: white; border-radius: 2px; transition: 0.3s; }

        /* כפתור פרופיל (שמאל) */
        .profile-link {
            width: 45px; height: 45px; background: var(--glass); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: 1px solid var(--border); transition: 0.3s; color: white;
        }
        .profile-link:hover { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        /* --- תפריט צד (AURA MENU) --- */
        .aura-menu {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: rgba(2, 2, 2, 0.98); z-index: 2000; padding: 40px;
            display: flex; flex-direction: column; transition: var(--transition-main);
        }
        .aura-menu.open { right: 0; }

        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        
        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 20px; }
        .menu-item {
            display: flex; align-items: center; gap: 20px; padding: 18px 25px;
            border-radius: 15px; border: 1px solid transparent; cursor: pointer;
            transition: 0.4s var(--apple-ease); position: relative; overflow: hidden;
            text-decoration: none; color: rgba(255,255,255,0.6);
        }
        
        /* סימון רך של אפשרות פעילה */
        .menu-item.active {
            border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.03);
            color: white; box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.05);
        }
        .menu-item.active::after {
            content: ''; position: absolute; inset: 0; 
            border: 1px solid var(--neon-blue); border-radius: 15px;
            animation: pulseActive 2s infinite;
        }

        @keyframes pulseActive { 0% { opacity: 0.2; } 50% { opacity: 0.5; } 100% { opacity: 0.2; } }

        .menu-item svg { color: var(--neon-blue); transition: 0.3s; }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: white; }

        /* --- אפקט מעבר אור רודף --- */
        .page-transition {
            position: fixed; inset: 0; background: var(--bg-dark);
            z-index: 9999; display: none; align-items: center; justify-content: center;
        }
        .chase-bar {
            width: 150%; height: 2px; position: absolute;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
            animation: chaseEffect 1.5s infinite;
        }
        @keyframes chaseEffect { 0% { transform: translateX(-100%) rotate(-10deg); } 100% { transform: translateX(100%) rotate(-10deg); } }

        /* שאר העיצוב המקורי שלך נשמר ללא שינוי */
        .aura-bg { position: absolute; width: 150%; height: 150%; background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.04) 0%, rgba(188, 19, 254, 0.04) 30%, transparent 70%); z-index: -1; animation: moveAura 20s infinite alternate ease-in-out; }
        @keyframes moveAura { 0% { transform: translate(-10%, -10%); } 100% { transform: translate(10%, 10%); } }
        .container { text-align: center; width: 90%; max-width: 500px; z-index: 10; }
        .welcome-text { font-size: clamp(2rem, 8vw, 3rem); font-weight: 100; letter-spacing: 5px; text-transform: uppercase; opacity: 0; transform: translateY(30px); animation: fadeInUp 1.2s forwards cubic-bezier(0.19, 1, 0.22, 1); background: linear-gradient(to right, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        .sub-text { font-size: 1.1rem; font-weight: 300; color: rgba(255, 255, 255, 0.7); line-height: 1.8; opacity: 0; animation: fadeInUp 1.2s 0.3s forwards cubic-bezier(0.19, 1, 0.22, 1); margin-bottom: 50px; }
        .btn-wrapper { position: relative; display: inline-block; opacity: 0; animation: fadeInUp 1.2s 0.6s forwards; }
        .ramo-btn { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 20px 50px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; position: relative; overflow: hidden; transition: var(--transition-main); display: flex; align-items: center; gap: 15px; box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); }
        .footer-security { position: absolute; bottom: 40px; display: flex; align-items: center; gap: 12px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 1px; opacity: 0; animation: fadeInUp 1s 1s forwards; }
        .dot-live { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; animation: blink 1.5s infinite; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <header class="ui-header">
        <a onclick="navigateTo('log.html')" class="profile-link" title="אזור אישי">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>

        <div class="electronic-frame">
            <div class="logo-content">
                <svg class="chip-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="15" x2="23" y2="15"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="15" x2="4" y2="15"></line></svg>
                <span class="logo-text-brand">AURA-studio</span>
            </div>
        </div>

        <div class="menu-trigger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <nav class="aura-menu" id="sideMenu">
        <div class="menu-header">
            <div class="logo-content">
                <span class="logo-text-brand">AURA MENU</span>
            </div>
            <div class="menu-trigger" onclick="toggleMenu()" style="border:none; background:transparent;">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
        </div>
        
        <div class="menu-list">
            <a href="#" class="menu-item active">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>בית</span>
            </a>
            <a onclick="navigateTo('ptiha.html')" class="menu-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                <span>הסוכן Ramo</span>
            </a>
            <a onclick="navigateTo('signin.html')" class="menu-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                <span>הרשמה</span>
            </a>
            <a onclick="navigateTo('log.html')" class="menu-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                <span>התחברות</span>
            </a>
            <a onclick="navigateTo('report.html')" class="menu-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                <span>דיווח על תקלה</span>
            </a>
        </div>
    </nav>

    <div class="page-transition" id="transitionLayer">
        <div class="chase-bar"></div>
    </div>

    <div class="aura-bg"></div>

    <div class="container">
        <h1 class="welcome-text">WELCOME TO AURA-STUDIO</h1>
        <div class="sub-text">
            <p>חווית הבינה המלאכותית הכי מזוקקת. הסוכן Ramo מחכה לך.</p>
        </div>
        <div class="btn-wrapper">
            <button class="ramo-btn" onclick="navigateTo('chat.html')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                <span>Talk Ramo</span>
            </button>
        </div>
    </div>

    <footer class="footer-security">
        <div class="dot-live"></div>
        <span>SECURITY ENCRYPTED | VERIFIED</span>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
        }

        function navigateTo(url) {
            const transition = document.getElementById('transitionLayer');
            transition.style.display = 'flex';
            
            setTimeout(() => {
                window.location.href = url;
            }, 1200);
        }

        // חסימת גלילה ב-Mobile
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
