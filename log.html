<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA-STUDIO | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <link rel="prefetch" href="users.html">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark);
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center;
            color: white; overflow: hidden; position: fixed;
        }

        /* לוגו אלקטרוני (תואם ptiha.html) */
        .logo-header { margin-top: 40px; z-index: 100; }
        .electronic-frame {
            position: relative; padding: 12px 25px; background: rgba(10, 10, 10, 0.8);
            border-radius: 12px; display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .electronic-frame::before {
            content: ''; position: absolute; width: 150px; height: 150px;
            background: conic-gradient(transparent, transparent, var(--neon-blue), var(--neon-purple), transparent);
            animation: trappedLight 2s linear infinite; z-index: 1;
        }
        .electronic-frame::after {
            content: ''; position: absolute; inset: 2px; background: var(--bg-dark);
            border-radius: 10px; z-index: 2;
        }
        .logo-content { position: relative; z-index: 3; display: flex; align-items: center; gap: 10px; }
        .logo-text-brand { font-size: 1rem; font-weight: 600; letter-spacing: 2px; color: #fff; }
        @keyframes trappedLight { 0% { transform: rotate(0deg) scale(2); } 100% { transform: rotate(360deg) scale(2); } }

        /* טקסט הסבר */
        .intro-section { text-align: center; margin-top: 30px; padding: 0 20px; max-width: 450px; z-index: 10; }
        .intro-section h2 { font-weight: 300; font-size: 1.1rem; line-height: 1.6; color: rgba(255,255,255,0.9); }
        .intro-section p { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 10px; }

        /* קונטיינר הטופס */
        .login-container {
            margin-top: 30px; width: 90%; max-width: 380px;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 24px; border: 1px solid var(--border);
            padding: 30px; z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 15px rgba(0, 242, 255, 0.03);
        }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; color: var(--neon-blue); }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        
        input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 14px 18px; border-radius: 12px; color: white; outline: none;
            transition: var(--transition); font-size: 1rem;
        }
        input:focus { border-color: var(--neon-blue); background: rgba(255,255,255,0.08); }
        input::placeholder { color: rgba(255,255,255,0.2); font-size: 0.9rem; }

        /* הודעת שגיאה באנגלית בלבד */
        .error-msg { color: #ff4d4d; font-size: 0.75rem; margin-top: 5px; display: none; }

        /* אייקון וי (V) מאומת */
        .verified-icon {
            position: absolute; left: 15px; color: #00ff88; 
            opacity: 0; transition: 0.3s; pointer-events: none;
        }

        /* עין לסיסמה */
        .eye-toggle { position: absolute; left: 15px; cursor: pointer; color: rgba(255,255,255,0.3); z-index: 5; }

        /* מד חוזק סיסמה */
        .strength-meter { height: 3px; width: 0%; background: #ff4d4d; margin-top: 8px; border-radius: 2px; transition: 0.3s; }

        /* צ'קבוקס */
        .remember-me { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.6); cursor: pointer; }
        .remember-me input { width: auto; }

        /* כפתור התחבר */
        .login-btn {
            width: 100%; margin-top: 25px; padding: 16px; border-radius: 12px;
            border: none; background: white; color: black; font-weight: 600;
            cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .login-btn:hover { transform: scale(1.02); background: var(--neon-blue); }

        /* חותמת אבטחה */
        .footer-security {
            position: absolute; bottom: 30px; display: flex; align-items: center; gap: 10px;
            font-size: 0.7rem; color: rgba(255,255,255,0.3); letter-spacing: 1px;
        }
        .dot-live { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 8px #00ff88; animation: blink 1.5s infinite; }

        /* לואדר */
        .loader { width: 16px; height: 16px; border: 2px solid #000; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <iframe src="users.html" id="usersEngine" style="display:none;"></iframe>

    <header class="logo-header">
        <div class="electronic-frame">
            <div class="logo-content">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"></rect><rect x="9" y="9" width="6" height="6"></rect></svg>
                <span class="logo-text-brand">AURA-studio</span>
            </div>
        </div>
    </header>

    <section class="intro-section">
        <h2>Ramo הוא סוכן AI חכם, המודל לומד את העדפות המשתמש, צור חשבון עכשיו בחינם!</h2>
        <p>קיבל גישה חינם ללא הגבלה ל-Ramo סוכן חכם בעל ליבת למידה. התחבר:</p>
    </section>

    <div class="login-container">
        <div class="form-group">
            <label>שם:</label>
            <div class="input-wrapper">
                <input type="text" id="username" placeholder="שם משתמש" maxlength="10" autocomplete="off">
                <span id="userV" class="verified-icon">✓</span>
            </div>
            <div id="userError" class="error-msg">Only English letters!</div>
        </div>

        <div class="form-group">
            <label>סיסמה:</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="הזן סיסמה" maxlength="8">
                <span class="eye-toggle" onclick="togglePass()">👁️</span>
                <span id="passV" class="verified-icon" style="left: 40px;">✓</span>
            </div>
            <div class="strength-meter" id="meter"></div>
        </div>

        <label class="remember-me">
            <input type="checkbox" id="remember">
            <span>זכור את הפרטים שלי</span>
        </label>

        <button class="login-btn" onclick="handleLogin()">
            <div class="loader" id="loader"></div>
            <span id="btnText">התחבר</span>
        </button>
    </div>

    <footer class="footer-security">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span>SECURITY VERIFIED</span>
        <div class="dot-live"></div>
        <span style="color: #00ff88;">CORE ACTIVE</span>
    </footer>

    <script>
        const userInp = document.getElementById('username');
        const passInp = document.getElementById('password');
        const userError = document.getElementById('userError');
        const userV = document.getElementById('userV');
        const passV = document.getElementById('passV');
        const meter = document.getElementById('meter');

        // אימות שם משתמש (אנגלית בלבד, וי ב-5 תווים)
        userInp.addEventListener('input', (e) => {
            let val = e.target.value;
            const englishRegex = /^[A-Za-z0-9]*$/;

            if (!englishRegex.test(val)) {
                userError.style.display = 'block';
            } else {
                userError.style.display = 'none';
            }

            if (val.length >= 5 && englishRegex.test(val)) {
                userV.style.opacity = '1';
            } else {
                userV.style.opacity = '0';
            }
        });

        // אימות סיסמה ומד חוזק
        passInp.addEventListener('input', (e) => {
            let val = e.target.value;
            let strength = (val.length / 8) * 100;
            meter.style.width = strength + '%';
            meter.style.background = val.length < 6 ? '#ff4d4d' : '#00ff88';

            if (val.length >= 6) {
                passV.style.opacity = '1';
            } else {
                passV.style.opacity = '0';
            }
        });

        function togglePass() {
            passInp.type = passInp.type === 'password' ? 'text' : 'password';
        }

        function handleLogin() {
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            if (userInp.value.length < 5 || passInp.value.length < 6) return;

            btnText.innerText = 'AUTHENTICATING...';
            loader.style.display = 'block';

            // גישה למנוע המשתמשים בתוך ה-iframe
            const engineFrame = document.getElementById('usersEngine').contentWindow;
            
            setTimeout(() => {
                const loginResult = engineFrame.AuraEngine.loginUser(userInp.value, passInp.value);

                if (loginResult.success) {
                    document.body.style.transition = 'opacity 1s ease, filter 1s ease';
                    document.body.style.opacity = '0';
                    document.body.style.filter = 'blur(15px)';
                    
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 800);
                } else {
                    // כישלון בהתחברות
                    btnText.innerText = 'ACCESS DENIED';
                    loader.style.display = 'none';
                    passInp.style.borderColor = '#ff4d4d';
                    
                    setTimeout(() => {
                        btnText.innerText = 'התחבר';
                        passInp.style.borderColor = 'rgba(255,255,255,0.1)';
                    }, 2000);
                }
            }, 2500);
        }

        // מניעת זום ותזוזה
        document.addEventListener('touchmove', (e) => {
            if (e.target.tagName !== 'INPUT') {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
