<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA-STUDIO | User Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <link rel="prefetch" href="users.html">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --apple-ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark);
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center;
            color: white; overflow: hidden; position: fixed;
        }

        /* לוגו אלקטרוני - זהה ל-ptiha.html */
        .logo-header { margin-top: 30px; z-index: 100; flex-shrink: 0; }
        .electronic-frame {
            position: relative; padding: 12px 25px; background: rgba(10, 10, 10, 0.8);
            border-radius: 12px; display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden; box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }
        .electronic-frame::before {
            content: ''; position: absolute; width: 150px; height: 150px;
            background: conic-gradient(transparent, transparent, var(--neon-blue), var(--neon-purple), transparent);
            animation: trappedLight 2s linear infinite; z-index: 1;
        }
        .electronic-frame::after {
            content: ''; position: absolute; inset: 2px; background: var(--bg-dark);
            border-radius: 10px; z-index: 2;
        }
        .logo-content { position: relative; z-index: 3; display: flex; align-items: center; gap: 10px; }
        .logo-text-brand { font-size: 1rem; font-weight: 600; letter-spacing: 2px; color: #fff; }
        @keyframes trappedLight { 0% { transform: rotate(0deg) scale(2); } 100% { transform: rotate(360deg) scale(2); } }

        /* אזור פרופיל עליון */
        .profile-card {
            margin-top: 40px; width: 90%; max-width: 500px;
            display: flex; gap: 20px; align-items: flex-start;
            padding: 20px; z-index: 10;
        }

        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            object-fit: cover; background: #111;
        }

        .user-info-list {
            display: flex; flex-direction: column; gap: 5px;
            text-align: right;
        }

        .info-item { font-size: 0.85rem; color: rgba(255,255,255,0.7); font-weight: 300; }
        .info-item b { color: var(--neon-blue); font-weight: 600; }
        .status-pro { color: #00ff88 !important; font-weight: 600; text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }

        /* תוכן מרכזי */
        .main-content {
            width: 90%; max-width: 500px; margin-top: 20px; z-index: 10;
        }

        .welcome-text {
            font-size: 1.1rem; font-weight: 300; line-height: 1.4;
            margin-bottom: 25px; color: rgba(255,255,255,0.9);
        }

        .action-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 10px 0;
        }

        .action-text { font-size: 0.95rem; color: #fff; font-weight: 300; }

        /* כפתור חשמלי אלגנטי */
        .electric-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: #fff; padding: 8px 16px; border-radius: 10px;
            font-size: 0.85rem; cursor: pointer; transition: var(--apple-ease) 0.4s;
            position: relative; overflow: hidden; backdrop-filter: blur(10px);
        }
        .electric-btn:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            transform: translateY(-2px);
        }
        .electric-btn::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); transition: 0.8s;
        }
        .electric-btn:active { transform: scale(0.95); }

        .divider {
            height: 1px; background: linear-gradient(90deg, var(--border), transparent);
            width: 100%; margin: 5px 0 15px 0;
        }

        /* חותמת אבטחה */
        .footer-security {
            position: absolute; bottom: 30px; display: flex; align-items: center; gap: 10px;
            font-size: 0.7rem; color: rgba(255,255,255,0.3); letter-spacing: 1px;
        }
        .dot-live { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 8px #00ff88; animation: blink 1.5s infinite; }

        /* לואדר מעבר */
        .page-transition {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999;
            display: none; opacity: 0; transition: 1s;
            flex-direction: column; align-items: center; justify-content: center;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <iframe src="users.html" id="usersEngine" style="display:none;"></iframe>

    <header class="logo-header">
        <div class="electronic-frame">
            <div class="logo-content">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"></rect><path d="M9 9h6v6H9z"></path></svg>
                <span class="logo-text-brand">AURA-studio</span>
            </div>
        </div>
    </header>

    <div class="profile-card">
        <div class="user-info-list">
            <div class="info-item">שם: <b id="display-name">טוען...</b></div>
            <div class="info-item">מייל: <b id="display-email">טוען...</b></div>
            <div class="info-item">ID: <b>#8842-AX</b></div>
            <div class="info-item">סטטוס: <span class="status-pro">PRO MEMBER</span></div>
            <div class="info-item">כניסה אחרונה: <b id="last-login">---</b></div>
        </div>
        <img id="profile-img" src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Aura" alt="Profile" class="profile-avatar">
    </div>

    <main class="main-content">
        <h1 class="welcome-text">
            ברוך הבא, <span id="welcome-name" style="color: var(--neon-blue);">User</span> לאזור האישי שלך.<br>
            הסוכן <span style="font-weight: 600;">Ramo</span> זמין ומוכן לשימוש בחינם בשבילך!
        </h1>

        <div class="action-row">
            <span class="action-text">התחל שיחה עם הסוכן-Ramo</span>
            <button class="electric-btn" onclick="navigate('chat.html')">שיחה חדשה</button>
        </div>
        
        <div class="divider"></div>

        <div class="action-row">
            <span class="action-text">בוא נערוך את הפרופיל שלי...</span>
            <button class="electric-btn" onclick="navigate('edit.html')">עריכה</button>
        </div>

        <div class="action-row">
            <span class="action-text">נתקלת בבעיה? נשמח לעזור!</span>
            <button class="electric-btn" onclick="navigate('report.html')">דיווח</button>
        </div>
    </main>

    <footer class="footer-security">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span>SECURITY VERIFIED</span>
        <div class="dot-live"></div>
        <span style="color: #00ff88;">CORE ACTIVE</span>
    </footer>

    <div class="page-transition" id="transition-overlay">
        <div style="width: 30px; height: 30px; border: 2px solid var(--neon-blue); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; font-size: 0.8rem; letter-spacing: 2px; color: var(--neon-blue);">AURA CONNECTING...</p>
    </div>

    <script>
        // פונקציה להזרקת נתוני משתמש מהמנוע
        window.addEventListener('load', () => {
            const engineFrame = document.getElementById('usersEngine').contentWindow;
            
            // המתנה קלה לוודא שה-iframe נטען
            setTimeout(() => {
                if (engineFrame.AuraEngine) {
                    const user = engineFrame.AuraEngine.getCurrentUser();
                    if (user) {
                        document.getElementById('display-name').innerText = user.username;
                        document.getElementById('display-email').innerText = user.email;
                        document.getElementById('welcome-name').innerText = user.username;
                        document.getElementById('last-login').innerText = user.lastLogin || "זה עתה";
                        document.getElementById('profile-img').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${user.username}`;
                    } else {
                        // אם אין משתמש מחובר, החזר לדף התחברות
                        window.location.href = 'log.html';
                    }
                }
            }, 100);
        });

        // ניווט עם אנימציה של 4 שניות
        function navigate(target) {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.opacity = '1';
                document.body.style.filter = 'blur(20px)';
                document.body.style.transition = '4s var(--apple-ease)';
            }, 10);

            setTimeout(() => {
                window.location.href = target;
            }, 4000);
        }

        // מניעת זום ותזוזה
        document.addEventListener('touchmove', (e) => {
            if (e.target.tagName !== 'BUTTON') e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
