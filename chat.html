<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA-STUDIO | Chat Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --apple-ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-dark); height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center;
            color: white; overflow: hidden; position: fixed;
            animation: fadeInBlur 1.5s var(--apple-ease) forwards;
        }

        @keyframes fadeInBlur {
            0% { opacity: 0; filter: blur(20px); transform: scale(1.02); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        .aura-bg { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.03) 0%, rgba(188, 19, 254, 0.03) 60%, transparent 100%); z-index: -1; }

        .ui-header {
            width: 100%; padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .electronic-frame {
            position: relative; padding: 10px 20px; background: rgba(10, 10, 10, 0.8);
            border-radius: 12px; display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden;
        }
        .electronic-frame::before {
            content: ''; position: absolute; width: 150px; height: 150px;
            background: conic-gradient(transparent, transparent, var(--neon-blue), var(--neon-purple), transparent);
            animation: trappedLight 3s linear infinite; z-index: 1;
        }
        .electronic-frame::after { content: ''; position: absolute; inset: 2px; background: var(--bg-dark); border-radius: 10px; z-index: 2; }
        .logo-content { position: relative; z-index: 3; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; color: #fff; }

        .system-tools { display: flex; gap: 12px; }
        .tool-btn { 
            width: 38px; height: 38px; background: var(--glass); border: 1px solid var(--border); 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        }

        .tool-btn.admin-loading {
            animation: adminPulse 0.4s ease infinite alternate;
            border-color: var(--neon-purple);
        }

        @keyframes adminPulse {
            0% { background: var(--glass); box-shadow: 0 0 0px var(--neon-purple); }
            100% { background: rgba(188, 19, 254, 0.4); box-shadow: 0 0 20px var(--neon-purple); transform: scale(1.05); }
        }

        @keyframes trappedLight { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .chat-container {
            flex: 1; width: calc(100% - 40px); max-width: 700px; margin: 10px 20px 20px 20px;
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border);
            border-radius: 28px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 40px rgba(188, 19, 254, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }

        .chat-head {
            padding: 20px 25px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.02);
        }

        .agent-profile { display: flex; align-items: center; }

        .avatar-aura {
            width: 50px; height: 50px; border-radius: 50%; position: relative;
            background: #000; overflow: hidden; border: 1px solid rgba(0, 242, 255, 0.3);
            margin-left: 15px;
        }
        
        .aura-core {
            position: absolute; inset: 0;
            background: conic-gradient(from 0deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            animation: glitchSpin 1.5s linear infinite;
            filter: blur(5px); opacity: 0.8;
        }

        @keyframes glitchSpin {
            0% { transform: rotate(0deg) scale(1); filter: hue-rotate(0deg) blur(5px); }
            50% { transform: rotate(180deg) scale(1.3); filter: hue-rotate(90deg) blur(8px); }
            100% { transform: rotate(360deg) scale(1); filter: hue-rotate(0deg) blur(5px); }
        }

        .chat-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .chat-body::-webkit-scrollbar { display: none; }

        .message { max-width: 85%; padding: 15px 20px; border-radius: 20px; line-height: 1.6; font-size: 0.95rem; animation: msgSlide 0.4s var(--apple-ease); position: relative; }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .ai-msg { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-bottom-right-radius: 5px; white-space: pre-wrap; }
        .user-msg { align-self: flex-end; background: var(--neon-blue); color: #000; font-weight: 500; border-bottom-left-radius: 5px; }

        .typing-cursor::after {
            content: '|';
            animation: blink 0.8s infinite;
            color: var(--neon-blue);
            margin-right: 2px;
        }

        .input-wrapper {
            padding: 25px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2);
            display: flex; gap: 12px; align-items: center;
        }
        .chat-input-field {
            flex: 1; background: var(--glass); border: 1px solid var(--border);
            padding: 15px 25px; border-radius: 30px; color: white; outline: none; transition: 0.3s;
        }
        .chat-input-field:focus { border-color: var(--neon-blue); }

        .send-trigger {
            width: 50px; height: 50px; border-radius: 50%; background: var(--neon-blue);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s var(--apple-ease);
        }
        .send-trigger:active { transform: scale(0.9); background: #fff; }
        
        .send-trigger.loading {
            width: 35px; height: 35px; border-radius: 40%; 
            background: var(--neon-purple); 
            animation: pulseBtn 0.8s infinite alternate;
            pointer-events: none;
        }
        
        @keyframes pulseBtn {
            0% { box-shadow: 0 0 5px var(--neon-purple); transform: scale(0.9); }
            100% { box-shadow: 0 0 25px var(--neon-purple); transform: scale(1.1); }
        }

        .footer-security { padding: 15px; display: flex; align-items: center; gap: 10px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.2); }
        .dot-live { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 8px #00ff88; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        
        #fadeOverlay { position: fixed; inset: 0; background: var(--bg-dark); opacity: 0; pointer-events: none; transition: 0.8s; z-index: 9999; }
    </style>
</head>
<body>

    <div id="fadeOverlay"></div>
    <div class="aura-bg"></div>

    <header class="ui-header">
        <div class="electronic-frame">
            <div class="logo-content">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--neon-blue)" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"></rect><rect x="9" y="9" width="6" height="6"></rect></svg>
                <span>AURA-STUDIO</span>
            </div>
        </div>
        <div class="system-tools">
            <div class="tool-btn" id="adminBtn" onclick="goToAdmin(this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div class="tool-btn" style="opacity:0.3"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
            <div class="tool-btn" style="opacity:0.3" onclick="location.reload()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div>
        </div>
    </header>

    <main class="chat-container">
        <div class="chat-head">
            <div class="agent-profile">
                <div class="avatar-aura"><div class="aura-core"></div></div>
                <div style="display:flex; flex-direction:column;">
                    <span style="font-weight:600; line-height: 1.2;">Ramo AI Agent</span>
                    <span id="agentStatus" style="font-size:0.7rem; color:var(--neon-blue); letter-spacing:2px">PRISMA ENGINE 1.1</span>
                </div>
            </div>
            <div class="dot-live"></div>
        </div>

        <div class="chat-body" id="chatBody"></div>

        <div class="input-wrapper">
            <input type="text" class="chat-input-field" id="userInput" placeholder="שלח הודעה ל-Ramo..." autocomplete="off">
            <button class="send-trigger" id="sendBtn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </main>

    <footer class="footer-security">
        <div class="dot-live"></div>
        <span>AURA SECURE PROTOCOL | VERIFIED</span>
    </footer>

    <script>
        const getApiKey = () => localStorage.getItem('AURA_API_KEY');
        
        let chatHistory = []; 

        async function typeWriter(text, elementId) {
            const element = document.getElementById(elementId);
            const chatBody = document.getElementById('chatBody');
            element.classList.add('typing-cursor');
            element.innerText = "";
            const cleanText = typeof text === 'string' ? text : JSON.stringify(text);
            for (let i = 0; i < cleanText.length; i++) {
                element.innerText += cleanText.charAt(i);
                chatBody.scrollTop = chatBody.scrollHeight;
                await new Promise(r => setTimeout(r, 8));
            }
            element.classList.remove('typing-cursor');
        }

        function updateStatus(status) {
            const s = document.getElementById('agentStatus');
            s.innerText = status;
            s.style.color = status.includes("THINKING") ? "var(--neon-purple)" : "var(--neon-blue)";
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            const apiKey = getApiKey();
            if (!apiKey) {
                appendMessage("מפתח API חסר. נא להגדיר ב-Admin Panel.", "ai");
                return;
            }

            const btn = document.getElementById('sendBtn');
            if (btn.disabled) return;

            appendMessage(text, 'user');
            input.value = '';
            btn.disabled = true;
            btn.classList.add('loading');
            updateStatus("THINKING...");

            chatHistory.push({ role: "user", parts: [{ text: text }] });

            const tId = 't_' + Date.now();
            appendMessage('...', 'ai', tId);

            try {
                // שימוש בנתיב v1 היציב לעבודה חלקה
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: chatHistory
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    await typeWriter(aiText, tId);
                    chatHistory.push({ role: "model", parts: [{ text: aiText }] });
                } else if (data.error) {
                    document.getElementById(tId).innerText = "שגיאת מערכת: " + data.error.message;
                    console.error("Detailed Error:", data.error);
                } else {
                    throw new Error("Invalid response format");
                }
            } catch (err) {
                document.getElementById(tId).innerText = 'פרוטוקול AURA נכשל בחיבור לשרת.';
                console.error("AURA Connection Error:", err);
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
                updateStatus("PRISMA ENGINE 1.1");
                input.focus();
            }
        }

        function appendMessage(text, side, id = '') {
            const chatBody = document.getElementById('chatBody');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${side}-msg`;
            if (id) msgDiv.id = id;
            msgDiv.innerText = text;
            chatBody.appendChild(msgDiv);
            chatBody.scrollTo({ top: chatBody.scrollHeight, behavior: 'smooth' });
        }

        function goToAdmin(btn) {
            btn.classList.add('admin-loading');
            const overlay = document.getElementById('fadeOverlay');
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'all';
            setTimeout(() => { window.location.href = 'admin.html'; }, 1200);
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        window.onload = () => {
            setTimeout(() => {
                appendMessage("מערכת AURA פעילה. הסוכן Ramo מוכן לפקודתך.", "ai");
            }, 500);
        };
    </script>
</body>
</html>
