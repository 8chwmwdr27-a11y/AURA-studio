<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA-STUDIO | Chat Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --apple-ease: cubic-bezier(0.19, 1, 0.22, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; color: white; overflow: hidden; position: fixed; }
        .aura-bg { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.03) 0%, rgba(188, 19, 254, 0.03) 60%, transparent 100%); z-index: -1; }
        .ui-header { width: 100%; padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .electronic-frame { position: relative; padding: 10px 20px; background: rgba(10, 10, 10, 0.8); border-radius: 12px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden; }
        .electronic-frame::before { content: ''; position: absolute; width: 150px; height: 150px; background: conic-gradient(transparent, transparent, var(--neon-blue), var(--neon-purple), transparent); animation: trappedLight 3s linear infinite; z-index: 1; }
        .electronic-frame::after { content: ''; position: absolute; inset: 2px; background: var(--bg-dark); border-radius: 10px; z-index: 2; }
        .logo-content { position: relative; z-index: 3; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; color: #fff; }
        .system-tools { display: flex; gap: 12px; }
        .tool-btn { width: 38px; height: 38px; background: var(--glass); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .chat-container { flex: 1; width: calc(100% - 40px); max-width: 700px; margin: 10px 20px 20px 20px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 28px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); }
        .chat-head { padding: 20px 25px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); }
        .avatar-aura { width: 50px; height: 50px; border-radius: 50%; position: relative; background: #000; overflow: hidden; border: 1px solid rgba(0, 242, 255, 0.3); margin-left: 15px; }
        .aura-core { position: absolute; inset: 0; background: conic-gradient(from 0deg, var(--neon-blue), var(--neon-purple), var(--neon-blue)); animation: glitchSpin 1.5s linear infinite; filter: blur(5px); opacity: 0.8; }
        @keyframes glitchSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .chat-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .message { max-width: 85%; padding: 15px 20px; border-radius: 20px; line-height: 1.6; font-size: 0.95rem; }
        .ai-msg { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-bottom-right-radius: 5px; white-space: pre-wrap; }
        .user-msg { align-self: flex-end; background: var(--neon-blue); color: #000; font-weight: 500; border-bottom-left-radius: 5px; }
        .input-wrapper { padding: 25px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); display: flex; gap: 12px; align-items: center; }
        .chat-input-field { flex: 1; background: var(--glass); border: 1px solid var(--border); padding: 15px 25px; border-radius: 30px; color: white; outline: none; }
        .send-trigger { width: 50px; height: 50px; border-radius: 50%; background: var(--neon-blue); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-trigger.loading { background: var(--neon-purple); animation: pulse 0.8s infinite alternate; pointer-events: none; }
        @keyframes pulse { from { transform: scale(0.9); } to { transform: scale(1.1); } }
        @keyframes trappedLight { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #fadeOverlay { position: fixed; inset: 0; background: var(--bg-dark); opacity: 0; pointer-events: none; transition: 0.8s; z-index: 9999; }
    </style>
</head>
<body>
    <div id="fadeOverlay"></div>
    <div class="aura-bg"></div>
    <header class="ui-header">
        <div class="electronic-frame">
            <div class="logo-content">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--neon-blue)" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"></rect><rect x="9" y="9" width="6" height="6"></rect></svg>
                <span>AURA-STUDIO</span>
            </div>
        </div>
        <div class="system-tools">
            <div class="tool-btn" onclick="window.location.href='admin.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
        </div>
    </header>
    <main class="chat-container">
        <div class="chat-head">
            <div class="agent-profile">
                <div class="avatar-aura"><div class="aura-core"></div></div>
                <div><span style="font-weight:600;">Ramo AI Agent</span><br><span id="agentStatus" style="font-size:0.7rem; color:var(--neon-blue);">PRISMA ENGINE 1.1</span></div>
            </div>
        </div>
        <div class="chat-body" id="chatBody"></div>
        <div class="input-wrapper">
            <input type="text" class="chat-input-field" id="userInput" placeholder="שלח הודעה ל-Ramo...">
            <button class="send-trigger" id="sendBtn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </main>
    <script>
        const getApiKey = () => localStorage.getItem('AURA_API_KEY');
        let chatHistory = [];

        async function typeWriter(text, elementId) {
            const el = document.getElementById(elementId);
            el.innerText = "";
            for (let i = 0; i < text.length; i++) {
                el.innerText += text.charAt(i);
                document.getElementById('chatBody').scrollTop = document.getElementById('chatBody').scrollHeight;
                await new Promise(r => setTimeout(r, 10));
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            const apiKey = getApiKey();
            if (!text || !apiKey) return;

            const btn = document.getElementById('sendBtn');
            appendMessage(text, 'user');
            input.value = '';
            btn.classList.add('loading');
            
            chatHistory.push({ role: "user", parts: [{ text: text }] });
            const tId = 't_' + Date.now();
            appendMessage('מחשב מסלול...', 'ai', tId);

            try {
                // הניסיון המדויק ביותר עם v1beta - גרסה התומכת במודל פלאש כרגע
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: chatHistory })
                });

                const data = await response.json();
                if (data.candidates) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    await typeWriter(aiText, tId);
                    chatHistory.push({ role: "model", parts: [{ text: aiText }] });
                } else {
                    throw new Error(data.error ? data.error.message : "Unknown error");
                }
            } catch (err) {
                document.getElementById(tId).innerText = "שגיאת פרוטוקול: " + err.message;
            } finally {
                btn.classList.remove('loading');
            }
        }

        function appendMessage(text, side, id = '') {
            const cb = document.getElementById('chatBody');
            const m = document.createElement('div');
            m.className = `message ${side}-msg`;
            if (id) m.id = id;
            m.innerText = text;
            cb.appendChild(m);
            cb.scrollTop = cb.scrollHeight;
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
