<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA-STUDIO | Join Ramo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <link rel="prefetch" href="users.html">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark);
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center;
            color: white; overflow: hidden; position: fixed;
        }

        /* לוגו אלקטרוני - זהה ל-ptiha.html */
        .logo-header { margin-top: 30px; z-index: 100; }
        .electronic-frame {
            position: relative; padding: 12px 25px; background: rgba(10, 10, 10, 0.8);
            border-radius: 12px; display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden; box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }
        .electronic-frame::before {
            content: ''; position: absolute; width: 150px; height: 150px;
            background: conic-gradient(transparent, transparent, var(--neon-blue), var(--neon-purple), transparent);
            animation: trappedLight 2s linear infinite; z-index: 1;
        }
        .electronic-frame::after {
            content: ''; position: absolute; inset: 2px; background: var(--bg-dark);
            border-radius: 10px; z-index: 2;
        }
        .logo-content { position: relative; z-index: 3; display: flex; align-items: center; gap: 10px; }
        .logo-text-brand { font-size: 1rem; font-weight: 600; letter-spacing: 2px; color: #fff; }
        @keyframes trappedLight { 0% { transform: rotate(0deg) scale(2); } 100% { transform: rotate(360deg) scale(2); } }

        /* כותרות */
        .intro-section { text-align: center; margin-top: 20px; padding: 0 20px; max-width: 500px; z-index: 10; }
        .intro-section h2 { font-weight: 300; font-size: 1.05rem; line-height: 1.5; color: rgba(255,255,255,0.9); }
        .intro-section p { font-size: 0.9rem; color: var(--neon-blue); margin-top: 10px; font-weight: 600; letter-spacing: 1px; }

        /* קונטיינר הטופס */
        .form-container {
            margin-top: 25px; width: 92%; max-width: 400px;
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 24px; border: 1px solid var(--border);
            padding: 25px; z-index: 10;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 20px rgba(0, 242, 255, 0.03);
        }

        .form-group { margin-bottom: 15px; position: relative; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 6px; color: #fff; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        
        input {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            padding: 12px 15px; border-radius: 12px; color: white; outline: none;
            transition: var(--transition); font-size: 1rem;
        }
        input:focus { border-color: var(--neon-blue); background: rgba(255,255,255,0.07); }
        input::placeholder { color: rgba(255,255,255,0.15); font-size: 0.85rem; }

        /* אינדיקטורים */
        .error-msg { color: #ff4d4d; font-size: 0.7rem; margin-top: 4px; display: none; }
        .v-check { position: absolute; left: 12px; color: #00ff88; opacity: 0; transition: 0.3s; pointer-events: none; }
        .eye-btn { position: absolute; left: 12px; cursor: pointer; opacity: 0.4; transition: 0.3s; z-index: 5; }
        .strength-bar { height: 3px; width: 0%; background: #ff4d4d; margin-top: 6px; border-radius: 2px; transition: 0.4s; }

        /* כפתור הרשמה */
        .action-btn {
            width: 100%; margin-top: 20px; padding: 15px; border-radius: 12px;
            border: none; background: #fff; color: #000; font-weight: 600;
            cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .action-btn:hover { background: var(--neon-blue); transform: translateY(-2px); }

        /* לואדר */
        .loader { width: 16px; height: 16px; border: 2px solid #000; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }

        /* חותמת אבטחה */
        .footer-security {
            position: absolute; bottom: 30px; display: flex; align-items: center; gap: 10px;
            font-size: 0.7rem; color: rgba(255,255,255,0.3); letter-spacing: 1px; z-index: 10;
        }
        .dot-live { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 8px #00ff88; animation: blink 1.5s infinite; }

        /* הגדרות צ'קליסט - סידור מחדש */
        .check-line { 
            display: flex; 
            align-items: center; 
            justify-content: flex-start;
            gap: 10px; 
            font-size: 0.75rem; 
            color: rgba(255,255,255,0.5); 
            margin-top: 10px; 
            cursor: pointer;
            direction: rtl; 
        }
        
        .check-line input {
            width: auto;
            cursor: pointer;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0.3; } }

    </style>
</head>
<body>

    <iframe src="users.html" id="usersEngine" style="display:none;"></iframe>

    <header class="logo-header">
        <div class="electronic-frame">
            <div class="logo-content">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"></rect><path d="M9 9h6v6H9z"></path></svg>
                <span class="logo-text-brand">AURA-studio</span>
            </div>
        </div>
    </header>

    <section class="intro-section">
        <h2>Ramo הוא סוכן AI חכם, המודל לומד את העדפות המשתמש, צור חשבון עכשיו בחינם!</h2>
        <p>הירשם</p>
    </section>

    <div class="form-container">
        <div class="form-group">
            <label>שם:</label>
            <div class="input-wrapper">
                <input type="text" id="userInp" placeholder="שם משתמש" maxlength="10" autocomplete="off">
                <span id="userV" class="v-check">✓</span>
            </div>
            <div id="userErr" class="error-msg">Only English letters!</div>
        </div>

        <div class="form-group">
            <label>מייל:</label>
            <div class="input-wrapper">
                <input type="email" id="mailInp" placeholder="example@gmail.com" maxlength="18" autocomplete="off">
                <span id="mailV" class="v-check">✓</span>
            </div>
            <div id="mailErr" class="error-msg">Use @gmail.com (English only)</div>
        </div>

        <div class="form-group">
            <label>סיסמה:</label>
            <div class="input-wrapper">
                <input type="password" id="passInp" placeholder="6-8 תווים" maxlength="8">
                <span class="eye-btn" onclick="togglePass()">👁️</span>
                <span id="passV" class="v-check" style="left: 35px;">✓</span>
            </div>
            <div class="strength-bar" id="strBar"></div>
        </div>

        <label class="check-line">
            <input type="checkbox" checked>
            <span>זכור את הפרטים שלי</span>
        </label>

        <button class="action-btn" onclick="register()">
            <div class="loader" id="loader"></div>
            <span id="btnTxt">הירשם</span>
        </button>
    </div>

    <footer class="footer-security">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span>SECURITY VERIFIED</span>
        <div class="dot-live"></div>
        <span style="color: #00ff88;">CORE ACTIVE</span>
    </footer>

    <script>
        const userInp = document.getElementById('userInp');
        const mailInp = document.getElementById('mailInp');
        const passInp = document.getElementById('passInp');

        // אימות שם משתמש
        userInp.addEventListener('input', (e) => {
            const val = e.target.value;
            const reg = /^[A-Za-z0-9]*$/;
            const err = document.getElementById('userErr');
            const v = document.getElementById('userV');

            if (!reg.test(val)) {
                err.style.display = 'block';
                v.style.opacity = '0';
            } else {
                err.style.display = 'none';
                v.style.opacity = val.length >= 5 ? '1' : '0';
            }
        });

        // אימות מייל
        mailInp.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const v = document.getElementById('mailV');
            const err = document.getElementById('mailErr');
            const isGmail = val.endsWith('@gmail.com');
            const onlyEng = /^[a-z0-9@.]*$/.test(val);

            if (isGmail && onlyEng && val.length > 10) {
                v.style.opacity = '1';
                err.style.display = 'none';
            } else {
                v.style.opacity = '0';
                if(val.length > 5) err.style.display = 'block';
            }
        });

        // אימות סיסמה
        passInp.addEventListener('input', (e) => {
            const val = e.target.value;
            const v = document.getElementById('passV');
            const bar = document.getElementById('strBar');
            const reg = /^[A-Za-z0-9]*$/;

            let strength = (val.length / 8) * 100;
            bar.style.width = strength + '%';
            bar.style.background = val.length < 6 ? '#ff4d4d' : '#00ff88';

            if (val.length >= 6 && reg.test(val)) {
                v.style.opacity = '1';
            } else {
                v.style.opacity = '0';
            }
        });

        function togglePass() {
            passInp.type = passInp.type === 'password' ? 'text' : 'password';
        }

        function register() {
            if (document.getElementById('userV').style.opacity !== '1' || 
                document.getElementById('mailV').style.opacity !== '1' || 
                document.getElementById('passV').style.opacity !== '1') {
                return;
            }

            const loader = document.getElementById('loader');
            const btnTxt = document.getElementById('btnTxt');

            loader.style.display = 'block';
            btnTxt.innerText = 'REGISTERING...';

            // קריאה למנוע המשתמשים לשמירת הנתונים
            const engine = document.getElementById('usersEngine').contentWindow;
            if (engine.AuraEngine) {
                engine.AuraEngine.registerUser(userInp.value, mailInp.value, passInp.value);
            }

            setTimeout(() => {
                document.body.style.transition = 'opacity 1s ease, filter 1s ease';
                document.body.style.opacity = '0';
                document.body.style.filter = 'blur(15px)';
                
                setTimeout(() => {
                    window.location.href = 'log.html';
                }, 800);
            }, 3000);
        }

        document.addEventListener('touchmove', (e) => {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'LABEL' && e.target.tagName !== 'SPAN') {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
